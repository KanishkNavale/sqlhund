[project]
name = "sqlhund"
version = "0.0.4"
description = "A Rust library with Python bindings for detecting SQL injection patterns in input strings. Built for speed and designed especially for AI agents that process or generate SQL queries."
authors = [{ name = "Kanishk Navale", email = "navalekanishk@gmail.com" }]
license = "MIT"
readme = "README.md"
requires-python = ">=3.12,<4.0"
keywords = ["sql", "injection", "security", "detection", "pyo3", "ai-agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = []

[project.urls]
Repository = "https://github.com/kanishknavale/sqlhund"

[build-system]
requires = ["maturin>=1.7"]
build-backend = "maturin"

[tool.maturin]
module-name = "sqlhund"
bindings = "pyo3"
features = ["pyo3/extension-module"]

[dependency-groups]
dev = ["maturin>=1.12.6", "pytest>=9.0.2", "tqdm>=4.67.3"]

[tool.pytest.ini_options]
addopts = "--color=yes --durations=10"
testpaths = ["tests"]
